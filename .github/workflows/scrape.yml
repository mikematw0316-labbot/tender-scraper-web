name: 爬取政府採購標案

on:
  workflow_dispatch:
    inputs:
      start_url:
        description: '政府採購網起始網址（必填）'
        required: true
      agency_name:
        description: '機關名稱（選填，填寫後跳過 Stage 1 自動抓取）'
        required: false
        default: ''
      keywords:
        description: '關鍵字（逗號分隔，留空用預設）'
        required: false
        default: '設計,監造,耐震,補強,技術'
      lookback_days:
        description: '日期前後查詢範圍（天）'
        required: false
        default: '180'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          START_URL: ${{ github.event.inputs.start_url }}
          AGENCY_NAME: ${{ github.event.inputs.agency_name }}
          KEYWORDS: ${{ github.event.inputs.keywords }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days }}
        run: python scraper/scraper.py

      - name: Commit results
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/results.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update tender data $(date +'%Y-%m-%d %H:%M') [$(echo '${{ github.event.inputs.start_url }}' | cut -c1-60)]"
          git pull --rebase origin main
          git push
